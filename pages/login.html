<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | STM Studio</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <!-- ================= NAVBAR ================= -->
    <header class="navbar">
        <div class="logo">
            <a href="../index.html">
                <img src="../images/logo.png" alt="STM Studio Logo">
            </a>
        </div>
        <h2>STM Studio</h2>
        <a href="../index.html" class="btn-profile-edit" style="text-decoration: none; padding: 8px 20px;">Home</a>
    </header>

    <div class="auth-container">
        <h2>Login</h2>
        
        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <!-- Email -->
            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>

            <!-- Password -->
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
                <i class="fa-solid fa-eye eye" onclick="togglePassword()"></i>
            </div>

            <!-- Remember Me and Forgot Password -->
            <div class="auth-options">
                <label>
                    <input type="checkbox" id="remember-me"> Remember Me
                </label>
                <a href="#" id="forgot-password" onclick="forgotPassword(); return false;">Forgot Password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="login-btn">Login</button>
        </form>

        <button type="button" class="google-btn">
            <i class="fa-brands fa-google"></i>
            Continue with Google
        </button>

        <div class="auth-redirect">
            New user? <a href="register.html">Register here</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="../script.js"></script>
</body>
</html>
